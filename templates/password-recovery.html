{% extends "base.html" %}

{% block content %}


<div class="container d-flex justify-content-center align-items-center vh-100 sans">
    <div class="card shadow" style="width: 22rem;">
        <div class="card-body">
            <h3 class="card-title text-center mb-4">Recupero password</h3>
            <form action="/api/forgotpwd" method="post">
                <div class="mb-3"><label for="email" class="form-label">Indirizzo email</label><input type="email"
                        class="form-control" id="email" placeholder="La tua email" required="required" name="email">
                </div>
                <div class="d-grid"><button type="submit" class="btn btn-primary">Invia email di recupero</button></div>
            </form>
        </div>
    </div>
</div>


{% endblock %}
